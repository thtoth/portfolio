<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="John Carter — Full-Stack Developer specialising in JavaScript, React, and Node.js." />
  <meta property="og:title" content="John Carter — Portfolio" />
  <meta property="og:description" content="Full-Stack Developer. I build fast, accessible, and beautiful digital experiences." />
  <meta property="og:type" content="website" />
  <title>John Carter — Portfolio</title>

  <!-- Fonts (self-contained subset via Google Fonts — no tracking, just glyphs) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =====================================================
       NAVIGATION
       ===================================================== -->
  <nav class="nav" id="main-nav" aria-label="Primary navigation">
    <div class="container nav-inner">
      <a href="#home" class="nav-logo" id="nav-logo" aria-label="Home">JC</a>

      <!-- Desktop links (populated by app.js) -->
      <ul class="nav-links" id="nav-links" role="list"></ul>

      <a href="#contact" class="nav-resume-btn" aria-label="Contact me">
        Contact&nbsp;Me
      </a>

      <button
        class="nav-hamburger"
        id="nav-hamburger"
        aria-label="Toggle navigation menu"
        aria-expanded="false"
        aria-controls="nav-drawer"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile drawer (populated by app.js) -->
  <nav
    class="nav-drawer"
    id="nav-drawer"
    aria-label="Mobile navigation"
  ></nav>
  <div class="nav-overlay" id="nav-overlay" aria-hidden="true"></div>

  <main>

    <!-- =====================================================
         HERO
         ===================================================== -->
    <header class="hero" id="home">
      <div class="container">
        <div class="hero-content">
          <span class="hero-greeting" id="hero-greeting"></span>
          <h1 class="hero-name" id="hero-name"></h1>
          <h2 class="hero-title" id="hero-title" aria-live="polite"></h2>
          <p class="hero-tagline" id="hero-tagline"></p>

          <div class="hero-ctas">
            <a href="#experience" class="btn btn-primary">View Work</a>
            <a href="#contact" class="btn btn-ghost">Contact Me</a>
          </div>

          <div class="hero-social" id="hero-social" aria-label="Social links"></div>
        </div>
      </div>

      <div class="hero-scroll" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <polyline points="19 12 12 19 5 12"/>
        </svg>
        <span>scroll</span>
      </div>
    </header>

    <!-- =====================================================
         EXPERIENCE
         ===================================================== -->
    <section class="experience" id="experience" aria-labelledby="experience-heading">
      <div class="container">
        <p class="section-label">02. Work History</p>
        <h2 class="section-title" id="experience-heading">Experience</h2>

        <div class="jobs-layout">
          <!-- Tab list (populated by app.js) -->
          <div
            class="job-tabs"
            id="job-tabs"
            role="tablist"
            aria-label="Work history by company"
          ></div>

          <!-- Tab panels (populated by app.js) -->
          <div class="job-panels" id="job-panels"></div>
        </div>
      </div>
    </section>

    <!-- =====================================================
         SKILLS
         ===================================================== -->
    <section class="skills" id="skills" aria-labelledby="skills-heading">
      <div class="container">
        <p class="section-label">03. Expertise</p>
        <h2 class="section-title" id="skills-heading">Skills</h2>

        <!-- Skill categories (populated by app.js) -->
        <div class="skills-grid" id="skills-grid"></div>
      </div>
    </section>

    <!-- =====================================================
         CONTACT
         ===================================================== -->
    <section class="contact" id="contact" aria-labelledby="contact-heading">
      <div class="container">
        <div class="contact-inner reveal">
          <p class="contact-overline">04. What's Next?</p>
          <h2 class="contact-heading" id="contact-heading">Get In Touch</h2>
          <p class="contact-message" id="contact-message"></p>

          <a
            href="#"
            class="contact-email"
            id="contact-email-link"
            aria-label="Send an email"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              width="18" height="18" aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <span id="contact-email-text"></span>
          </a>

          <div class="contact-social" id="contact-social" aria-label="Social links"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- =====================================================
       FOOTER
       ===================================================== -->
  <footer class="footer" aria-label="Site footer">
    <div class="container">
      <div class="footer-inner">
        <nav class="footer-nav" id="footer-nav" aria-label="Footer navigation"></nav>
        <p class="footer-copy" id="footer-copy"></p>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
